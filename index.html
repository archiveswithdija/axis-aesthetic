<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Curvo Pro | Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=STIX+Two+Text:wght@400;600&family=Space+Mono&family=VT323&family=Caveat&family=Press+Start+2P&family=Architects+Daughter&family=Orbitron&family=Syncopate:wght@700&family=Courier+Prime&family=Playfair+Display:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>

  <style>
    :root {
      --bg: #1a1a1a;
      --panel: rgba(40, 40, 40, 0.75);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --glow: 0 0 15px rgba(56,189,248,0.5);
      --font-main: "Inter", sans-serif;
      --radius: 20px;
      --grid-weight: 0.15;
      --axis-color: #666666;
      --card-border: 1px solid rgba(255,255,255,0.1);
      --line-color-1: #38bdf8;
      --line-color-2: #ff00ff;
      --line-color-3: #00ffcc;
      --line-color-4: #ffcc00;
      --line-color-5: #ff4d4d;
    }

    /* --- THEME DEFINITIONS --- */
    body.theme-normal { --bg: #1a1a1a; --panel: rgba(40, 40, 40, 0.75); --text: #e5e7eb; --accent: #38bdf8; --font-main: "Inter", sans-serif; --radius: 20px; --grid-weight: 0.15; --axis-color: #666666; --line-color-1: #38bdf8; --line-color-2: #ff00ff; --line-color-3: #00ffcc; --line-color-4: #ffcc00; --line-color-5: #ff4d4d; }
    body.theme-light { --bg: #f8f9fa; --panel: rgba(255, 255, 255, 0.9); --text: #1a1a1a; --muted: #6c757d; --accent: #0d6efd; --font-main: "Inter", sans-serif; --radius: 15px; --grid-weight: 0.2; --axis-color: #333333; --card-border: 1px solid rgba(0,0,0,0.1); --line-color-1: #0d6efd; --line-color-2: #d63384; --line-color-3: #0dcaf0; --line-color-4: #ffc107; --line-color-5: #dc3545; }
    body.theme-dark { --bg: #000000; --panel: rgba(15, 15, 15, 0.85); --text: #00f2ff; --accent: #00f2ff; --font-main: "Inter", sans-serif; --radius: 20px; --grid-weight: 0.25; --axis-color: #00f2ff; --glow: 0 0 20px rgba(0, 242, 255, 0.6); --line-color-1: #00f2ff; --line-color-2: #ff006e; --line-color-3: #8338ec; --line-color-4: #ffbe0b; --line-color-5: #fb5607; }
    body.theme-paper { --bg: #fdfbf7; --panel: #ffffff; --text: #2c2c2c; --muted: #8e8e8e; --accent: #6b4423; --font-main: "Courier Prime", monospace; --radius: 2px; --grid-weight: 0.3; --axis-color: #000000; --card-border: 1px solid #d4d4d4; --bg-pattern: repeating-linear-gradient(0deg, transparent, transparent 31px, #e8e8e8 31px, #e8e8e8 32px); --line-color-1: #1a5490; --line-color-2: #8b0000; --line-color-3: #006400; --line-color-4: #b8860b; --line-color-5: #4b0082; }
    body.theme-blueprint { --bg: #0a3d62; --panel: rgba(10, 61, 98, 0.85); --text: #ffffff; --accent: #ffffff; --font-main: "Architects Daughter", cursive; --radius: 0; --grid-weight: 0.4; --axis-color: #ffffff; --bg-pattern: linear-gradient(rgba(255,255,255,0.08) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.08) 2px, transparent 2px), linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); --bg-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px; --card-border: 2px solid rgba(255,255,255,0.5); --line-color-1: #00ffff; --line-color-2: #ffff00; --line-color-3: #ff00ff; --line-color-4: #00ff00; --line-color-5: #ff8800; }
    body.theme-light-academia { --bg: #f4f1ea; --panel: #fefefe; --text: #433d3c; --muted: #8c7851; --accent: #8c7851; --font-main: "STIX Two Text", serif; --radius: 8px; --axis-color: #2c2416; --card-border: 1px solid #d1ccc0; --line-color-1: #7c6f5d; --line-color-2: #9b6b4f; --line-color-3: #5a7359; --line-color-4: #8b6f47; --line-color-5: #6b5d54; }
    body.theme-dark-academia { --bg: #1a1614; --panel: rgba(40, 35, 31, 0.9); --text: #d4c5b0; --muted: #9b8b7e; --accent: #c9a66b; --font-main: "Playfair Display", serif; --radius: 5px; --axis-color: #d4c5b0; --card-border: 1px solid rgba(201, 166, 107, 0.3); --line-color-1: #c9a66b; --line-color-2: #a67c52; --line-color-3: #8b7355; --line-color-4: #d4a574; --line-color-5: #9d8b6f; }
    body.theme-coffee { --bg: #2b1a0f; --panel: rgba(59, 39, 26, 0.85); --text: #e6d5c3; --muted: #c4a57b; --accent: #d4a574; --font-main: "Caveat", cursive; --radius: 15px; --axis-color: #d4a574; --card-border: 2px solid rgba(212, 165, 116, 0.4); --line-color-1: #d4a574; --line-color-2: #a67c52; --line-color-3: #8b6f47; --line-color-4: #e6c9a8; --line-color-5: #c19a6b; }
    body.theme-tea { --bg: #f0ebe3; --panel: rgba(255, 255, 255, 0.8); --text: #4a5759; --muted: #7a8a8c; --accent: #6b8e23; --font-main: "STIX Two Text", serif; --radius: 12px; --axis-color: #556b2f; --card-border: 1px solid #c9d8b6; --line-color-1: #6b8e23; --line-color-2: #8fbc8f; --line-color-3: #556b2f; --line-color-4: #9acd32; --line-color-5: #708238; }
    body.theme-dreamwave { --bg: #241744; --panel: rgba(48, 25, 82, 0.75); --text: #ff71ce; --accent: #05ffa1; --font-main: "Syncopate", sans-serif; --radius: 30px; --axis-color: #b967ff; --bg-pattern: linear-gradient(180deg, #241744 0%, #603f8b 50%, #b967ff 100%); --glow: 0 0 25px rgba(5, 255, 161, 0.6); --line-color-1: #05ffa1; --line-color-2: #ff71ce; --line-color-3: #b967ff; --line-color-4: #01cdfe; --line-color-5: #fffb96; }
    body.theme-neon-glitch { --bg: #000000; --panel: rgba(10, 10, 10, 0.95); --text: #ffffff; --accent: #ff0055; --font-main: "Orbitron", sans-serif; --radius: 0; --axis-color: #00fff2; --card-border: 2px solid #ff0055; --line-color-1: #ff0055; --line-color-2: #00fff2; --line-color-3: #ffff00; --line-color-4: #00ff00; --line-color-5: #ff00ff; }
    body.theme-cyberpunk { --bg: #0f0f23; --panel: rgba(30, 15, 50, 0.8); --text: #00ffff; --accent: #ff00ff; --font-main: "Roboto Mono", monospace; --radius: 5px; --axis-color: #ff00ff; --bg-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 0, 255, 0.03) 2px, rgba(255, 0, 255, 0.03) 4px); --glow: 0 0 20px rgba(255, 0, 255, 0.5); --card-border: 1px solid rgba(0, 255, 255, 0.4); --line-color-1: #ff00ff; --line-color-2: #00ffff; --line-color-3: #ffff00; --line-color-4: #ff0066; --line-color-5: #00ff99; }
    body.theme-retro { --bg: #1a1a2e; --panel: rgba(22, 34, 42, 0.9); --text: #eee; --accent: #ff6b6b; --font-main: "VT323", monospace; --radius: 0; --axis-color: #4ecdc4; --card-border: 3px solid #4ecdc4; --line-color-1: #ff6b6b; --line-color-2: #4ecdc4; --line-color-3: #ffe66d; --line-color-4: #a8e6cf; --line-color-5: #ff8b94; }
    body.theme-space { --bg: #020205; --panel: rgba(10, 10, 20, 0.85); --text: #e0e0ff; --accent: #7d5fff; --font-main: "Space Mono", monospace; --radius: 50px; --axis-color: #6a5acd; --card-border: 1px solid rgba(125, 95, 255, 0.4); --bg-pattern: radial-gradient(circle at 20% 50%, rgba(120, 100, 255, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255, 100, 200, 0.08) 0%, transparent 50%); --line-color-1: #7d5fff; --line-color-2: #9d4edd; --line-color-3: #5a67d8; --line-color-4: #6366f1; --line-color-5: #8b5cf6; }
    body.theme-surprise { --bg: #000000; --panel: rgba(20, 20, 20, 0.9); --text: #ffff00; --accent: #ffff00; --font-main: "Press Start 2P", cursive; --radius: 0; --axis-color: #0000ff; --card-border: 4px solid #0000ff; --grid-weight: 0.1; --line-color-1: #ff0000; --line-color-2: #ffb8ff; --line-color-3: #00ffff; --line-color-4: #ffb851; --line-color-5: #ffffff; }

    /* CORE STYLES */
    body { margin: 0; font-family: var(--font-main); background: var(--bg); background-image: var(--bg-pattern); background-size: var(--bg-size); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; transition: all 0.4s ease; min-height: 100vh; overflow-x: hidden; position: relative; }
    h1 { font-size: 3rem; margin: 0; font-weight: 600; text-shadow: var(--glow); text-transform: uppercase; position: relative; z-index: 10; }
    .subtitle { color: var(--muted); letter-spacing: 2px; margin-bottom: 20px; position: relative; z-index: 10; }
    .theme-bar { display: flex; gap: 8px; margin: 25px 0; flex-wrap: wrap; justify-content: center; z-index: 10; position: relative; }
    button.theme-btn { background: var(--panel); border: var(--card-border); color: var(--text); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 10px; font-family: var(--font-main); transition: 0.3s; text-transform: uppercase; }
    button.theme-btn:hover { background: var(--accent); color: var(--bg); box-shadow: var(--glow); transform: translateY(-2px); }
    .app-container { display: flex; gap: 25px; max-width: 1400px; width: 100%; justify-content: center; align-items: flex-start; position: relative; z-index: 5; }
    .card { background: var(--panel); border: var(--card-border); border-radius: var(--radius); padding: 22px; backdrop-filter: blur(15px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); transition: all 0.3s; }
    .sidebar { width: 380px; display: flex; flex-direction: column; gap: 20px; }
    .slider-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
    .slider-row label { width: 20px; font-weight: bold; color: var(--accent); }
    input[type="range"] { flex-grow: 1; accent-color: var(--accent); cursor: pointer; }
    .eq-row { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.15); padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid; position: relative; }
    .eq-row input { background: transparent; border: none; color: var(--text); font-family: var(--font-main); font-size: 1.1rem; width: 100%; outline: none; }
    .color-picker { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--text); cursor: pointer; }
    .graph-box { position: relative; flex-grow: 1; }
    canvas { border-radius: calc(var(--radius) / 2); display: block; width: 100%; background: rgba(255,255,255,0.02); }
    #coords { position: absolute; top: 20px; right: 20px; background: var(--panel); padding: 8px 15px; border-radius: 5px; font-family: monospace; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; }
    .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
    .keypad button { padding: 10px; font-size: 11px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; transition: 0.2s; }
    .keypad button:hover { background: var(--accent); color: var(--bg); }
    .section-title { font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; color: var(--accent); font-weight: 600; }
    .history-item { background: rgba(0,0,0,0.1); padding: 8px; border-radius: 5px; margin: 5px 0; font-size: 0.9rem; cursor: pointer; border-left: 3px solid var(--accent); }
    .history-clear { margin-top: 10px; padding: 6px; background: rgba(255,0,0,0.2); border: 1px solid rgba(255,0,0,0.4); color: var(--text); border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
  </style>
</head>

<body class="theme-normal">
  <h1>Curvo Pro</h1>
  <p class="subtitle">MATHEMATICAL VISUALIZER</p>

  <div class="theme-bar">
    <button class="theme-btn" onclick="setTheme('theme-normal')">Normal</button>
    <button class="theme-btn" onclick="setTheme('theme-light')">Light</button>
    <button class="theme-btn" onclick="setTheme('theme-dark')">Dark</button>
    <button class="theme-btn" onclick="setTheme('theme-paper')">Paper</button>
    <button class="theme-btn" onclick="setTheme('theme-blueprint')">Blueprint</button>
    <button class="theme-btn" onclick="setTheme('theme-light-academia')">L-Academia</button>
    <button class="theme-btn" onclick="setTheme('theme-dark-academia')">D-Academia</button>
    <button class="theme-btn" onclick="setTheme('theme-coffee')">Coffee</button>
    <button class="theme-btn" onclick="setTheme('theme-tea')">Tea</button>
    <button class="theme-btn" onclick="setTheme('theme-dreamwave')">Dreamwave</button>
    <button class="theme-btn" onclick="setTheme('theme-neon-glitch')">Neon Glitch</button>
    <button class="theme-btn" onclick="setTheme('theme-cyberpunk')">Cyberpunk</button>
    <button class="theme-btn" onclick="setTheme('theme-retro')">Retro</button>
    <button class="theme-btn" onclick="setTheme('theme-space')">Space</button>
    <button class="theme-btn" onclick="setTheme('theme-surprise')">🎮 Surprise</button>
  </div>

  <div class="app-container">
    <div class="sidebar">
      <div class="card">
        <div class="section-title">Constants</div>
        <div class="slider-row"><label>a</label><input type="range" id="param-a" min="-10" max="10" step="0.1" value="1" oninput="updateParam('a', this.value)"><span id="val-a">1</span></div>
        <div class="slider-row"><label>b</label><input type="range" id="param-b" min="-10" max="10" step="0.1" value="0" oninput="updateParam('b', this.value)"><span id="val-b">0</span></div>
        <div class="slider-row"><label>c</label><input type="range" id="param-c" min="-10" max="10" step="0.1" value="0" oninput="updateParam('c', this.value)"><span id="val-c">0</span></div>
      </div>

      <div class="card">
        <div class="keypad">
            <button onclick="addChar('sin(')">SIN</button><button onclick="addChar('cos(')">COS</button><button onclick="addChar('tan(')">TAN</button><button onclick="addChar('^')">^</button>
            <button onclick="addChar('x')">X</button><button onclick="addChar('a')">A</button><button onclick="addChar('b')">B</button><button onclick="addChar('c')">C</button>
            <button onclick="addChar('sqrt(')">√</button><button onclick="addChar('log(')">LOG</button><button onclick="addChar('abs(')">ABS</button><button onclick="addChar('pi')">π</button>
        </div>
        <div class="section-title">Functions</div>
        <div id="eq-list"></div>
        <button onclick="newEquation()" class="theme-btn" style="width:100%; margin-top:10px;">+ Add Function</button>
      </div>

      <div class="card">
        <div class="section-title">Zoom Intensity</div>
        <input id="zoom" type="range" min="20" max="300" value="80" style="width:100%; margin-top:10px;">
      </div>

      <div class="card">
        <div class="section-title">History</div>
        <div id="history-list" style="max-height: 150px; overflow-y: auto;"></div>
        <button class="history-clear" onclick="clearHistory()">Clear History</button>
      </div>
    </div>

    <div class="graph-box card">
      <canvas id="graph" width="850" height="580"></canvas>
      <div id="coords">0.00, 0.00</div>
    </div>
  </div>

<script>
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");
const eqListEl = document.getElementById("eq-list");
const zoomSlider = document.getElementById("zoom");
const coordEl = document.getElementById("coords");
const historyEl = document.getElementById("history-list");

let equations = [{ id: 1, text: 'a * sin(x + b) + c', color: null }];
let params = { a: 1, b: 0, c: 0 };
let activeInput = null;
let history = JSON.parse(localStorage.getItem('curvo-history') || '[]');
let currentTheme = 'theme-normal';

let pacman = {
  x: 100,
  y: canvas.height / 2,
  size: 25,
  angle: 0,
  mouthOpen: 0,
  direction: 1,
  speed: 2,
  targetY: canvas.height / 2
};

function setTheme(t) { 
  currentTheme = t;
  document.body.className = t; 
  render(); 
}

function updateParam(p, val) {
  params[p] = parseFloat(val);
  document.getElementById(`val-${p}`).innerText = val;
  addToHistory(`${p} = ${val}`);
  render();
}

function getThemeColor(index) {
  const style = getComputedStyle(document.documentElement);
  return style.getPropertyValue(`--line-color-${(index % 5) + 1}`).trim();
}

function newEquation() {
  equations.push({ id: Date.now(), text: '', color: null });
  updateUI();
}

function updateUI() {
  eqListEl.innerHTML = '';
  equations.forEach((eq, idx) => {
    const defaultColor = getThemeColor(idx);
    const actualColor = eq.color || defaultColor;
    const row = document.createElement('div');
    row.className = 'eq-row';
    row.style.borderLeftColor = actualColor;
    row.innerHTML = `
      <span style="opacity:0.5">f(x)=</span>
      <input type="text" value="${eq.text}" onfocus="activeInput=this" oninput="updateEq(${eq.id}, this.value)">
      <input type="color" class="color-picker" value="${actualColor}" onchange="updateColor(${eq.id}, this.value)" title="Change color">
      <span onclick="deleteEq(${eq.id})" style="cursor:pointer; padding: 0 5px; font-size: 1.2rem;">×</span>
    `;
    eqListEl.appendChild(row);
  });
}

function updateEq(id, text) {
  const eq = equations.find(e => e.id === id);
  if(eq) { eq.text = text; addToHistory(`f(x) = ${text}`); }
  render();
}

function updateColor(id, color) {
  const eq = equations.find(e => e.id === id);
  if(eq) eq.color = color;
  updateUI(); render();
}

function deleteEq(id) {
  equations = equations.filter(e => e.id !== id);
  updateUI(); render();
}

function addChar(c) {
  if(!activeInput) return;
  const start = activeInput.selectionStart;
  activeInput.value = activeInput.value.slice(0, start) + c + activeInput.value.slice(start);
  activeInput.focus();
  activeInput.dispatchEvent(new Event('input'));
}

function addToHistory(item) {
  const timestamp = new Date().toLocaleTimeString();
  history.unshift(`[${timestamp}] ${item}`);
  if(history.length > 20) history = history.slice(0, 20);
  localStorage.setItem('curvo-history', JSON.stringify(history));
  updateHistory();
}

function updateHistory() {
  historyEl.innerHTML = '';
  history.forEach(item => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.textContent = item;
    historyEl.appendChild(div);
  });
}

function clearHistory() { history = []; localStorage.removeItem('curvo-history'); updateHistory(); }

function drawGrid(zoom) {
  const cx = canvas.width/2; const cy = canvas.height/2;
  const axisColor = getComputedStyle(document.body).getPropertyValue('--axis-color').trim();
  const gridAlpha = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--grid-weight'));
  ctx.strokeStyle = axisColor; ctx.lineWidth = 0.5; ctx.globalAlpha = gridAlpha;
  for(let x = cx % zoom; x < canvas.width; x += zoom) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
  for(let y = cy % zoom; y < canvas.height; y += zoom) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
  ctx.globalAlpha = 0.8; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
  ctx.globalAlpha = 1; ctx.fillStyle = axisColor; ctx.font = `bold 12px ${getComputedStyle(document.body).fontFamily}`; ctx.textAlign = "center";
  for (let i = 1; i * zoom < canvas.width/2; i++) {
      ctx.fillText(i, cx + i * zoom, cy + 20); ctx.fillText(-i, cx - i * zoom, cy + 20);
      ctx.fillText(i, cx - 15, cy - i * zoom + 5); ctx.fillText(-i, cx - 15, cy + i * zoom + 5);
  }
}

function drawPacman() {
  if(currentTheme !== 'theme-surprise') return;
  pacman.mouthOpen += 0.1;
  const mouthAngle = Math.abs(Math.sin(pacman.mouthOpen)) * 0.3;
  pacman.x += pacman.speed * pacman.direction;
  if(pacman.x > canvas.width + 50) { pacman.x = -50; pacman.targetY = Math.random() * canvas.height; }
  if(Math.abs(pacman.y - pacman.targetY) > 2) { pacman.y += (pacman.targetY - pacman.y) * 0.02; }
  ctx.save(); ctx.translate(pacman.x, pacman.y);
  ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(0, 0, pacman.size, mouthAngle, Math.PI * 2 - mouthAngle); ctx.lineTo(0, 0); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(8, -10, 3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // --- ADDED GHOSTS ---
  equations.forEach((eq, idx) => {
    if(!eq.text) return;
    try {
      const node = math.compile(eq.text);
      const x = (pacman.x - canvas.width/2) / parseFloat(zoomSlider.value);
      const y = node.evaluate({ x, a: params.a, b: params.b, c: params.c });
      const py = canvas.height/2 - (y * parseFloat(zoomSlider.value));
      if(!isNaN(py) && Math.abs(py) < canvas.height) {
        const color = eq.color || getThemeColor(idx);
        const gSize = 12;
        ctx.save(); ctx.translate(pacman.x, py);
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0, -gSize/2, gSize, Math.PI, 0); ctx.lineTo(gSize, gSize);
        for (let i = 0; i <= 3; i++) { ctx.lineTo(gSize - (i * (gSize*2/3)), gSize + (i % 2 === 0 ? 3 : -3)); }
        ctx.lineTo(-gSize, gSize); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(-4, -gSize/2, 3, 0, Math.PI * 2); ctx.arc(4, -gSize/2, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "blue"; ctx.beginPath(); ctx.arc(-3, -gSize/2, 1.5, 0, Math.PI * 2); ctx.arc(5, -gSize/2, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    } catch(e) {}
  });
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const zoom = parseFloat(zoomSlider.value);
  const cx = canvas.width/2; const cy = canvas.height/2;
  drawGrid(zoom);
  equations.forEach((eq, idx) => {
    if(!eq.text) return;
    try {
      const node = math.compile(eq.text);
      const color = eq.color || getThemeColor(idx);
      ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor = color;
      let first = true;
      for(let px = 0; px < canvas.width; px++) {
        const x = (px - cx) / zoom;
        const y = node.evaluate({ x, a: params.a, b: params.b, c: params.c });
        const py = cy - (y * zoom);
        if(isNaN(py) || Math.abs(py) > canvas.height * 2) { first = true; continue; }
        if(first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
      }
      ctx.stroke(); ctx.shadowBlur = 0;
    } catch(e) {}
  });
  drawPacman();
}

function animate() { render(); requestAnimationFrame(animate); }

canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) * (canvas.width / rect.width);
    const py = (e.clientY - rect.top) * (canvas.height / rect.height);
    const zoom = parseFloat(zoomSlider.value);
    coordEl.innerText = `${((px - canvas.width/2) / zoom).toFixed(2)}, ${((canvas.height/2 - py) / zoom).toFixed(2)}`;
};

zoomSlider.oninput = render;
updateUI(); updateHistory(); animate();
</script>
</body>
